name: transcribe-batch

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */2 * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: transcribe-bili-repo
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp faster-whisper huggingface_hub

      - name: Write cookies.txt
        shell: bash
        run: |
          if [ -z "${{ secrets.BILIBILI_COOKIES_TXT }}" ]; then
            echo "BILIBILI_COOKIES_TXT secret is empty"
            exit 1
          fi
          cat > cookies.txt <<'EOF'
${{ secrets.BILIBILI_COOKIES_TXT }}
EOF

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run batch transcriber
        env:
          BILIBILI_COOKIES_FILE: cookies.txt
          GITHUB_REF_NAME: ${{ github.ref_name }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TARGET_BVID: ""
        run: python scripts/transcribe_bili.py

      - name: Show progress
        if: always()
        shell: bash
        run: |
          echo "===== final progress ====="
          test -f state/progress.json && cat state/progress.json || true
          echo "===== done count ====="
          test -f state/done.txt && wc -l state/done.txt || true
          echo "===== failed count ====="
          test -f state/failed.txt && wc -l state/failed.txt || true
          echo "===== transcript files ====="
          test -d transcripts && find transcripts -maxdepth 1 -name 'BV*.txt' | wc -l || true

      - name: Trigger next batch run
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -f state/continue.flag ]; then
            echo "continue.flag exists, trigger next run"
            for i in 1 2 3 4 5; do
              gh workflow run .github/workflows/transcribe-batch.yml --ref "${GITHUB_REF_NAME:-main}" && exit 0
              echo "dispatch failed, retry ${i}/5"
              sleep $((i * 30))
            done
            echo "Dispatch failed after retries. Next scheduled run can continue from repo state."
          else
            echo "continue.flag not found, stop here"
          fi
