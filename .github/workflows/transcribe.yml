name: transcribe-zhangxuefeng

on:
  workflow_dispatch:
    inputs:
      resume:
        description: "resume flag"
        required: false
        default: "1"
  schedule:
    - cron: "20 */6 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: zhangxuefeng-transcribe
  cancel-in-progress: false

jobs:
  transcribe:
    # 如果你已经有自己的 runner，推荐改成 self-hosted
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp faster-whisper

      - name: Write cookies
        shell: bash
        run: |
          cat > cookies.txt <<'EOF'
          ${{ secrets.BILIBILI_COOKIES }}
          EOF

      - name: Prepare git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p transcripts state tmp_audio

      - name: Run transcriber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: transcribe.yml
          RUN_REF: ${{ github.ref_name }}
        run: |
          python scripts/transcribe_bili.py

      - name: Push progress
        run: |
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git add transcripts state
          git diff --cached --quiet || git commit -m "progress: transcribed batch"
          git push origin HEAD:"${GITHUB_REF_NAME}" || true

      - name: Trigger next run if needed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f state/continue.flag ]; then
            gh workflow run transcribe.yml --ref "${GITHUB_REF_NAME}"
          fi
