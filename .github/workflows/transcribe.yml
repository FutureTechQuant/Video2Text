name: transcribe-zhangxuefeng

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: zhangxuefeng-transcribe
  cancel-in-progress: false

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp faster-whisper

      - name: Write cookies
        shell: bash
        run: |
          cat > cookies.txt <<'EOF'
          ${{ secrets.BILIBILI_COOKIES }}
          EOF

      - name: Prepare dirs
        run: |
          mkdir -p state transcripts tmp_audio

      - name: Restore previous checkpoint artifact if exists
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: latest-checkpoint
          path: .

      - name: Run transcriber
        run: |
          python scripts/transcribe_bili.py

      - name: Upload checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: latest-checkpoint
          path: |
            state/**
            transcripts/**
          overwrite: true
          retention-days: 14
