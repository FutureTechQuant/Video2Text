name: transcribe-zhangxuefeng

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: zhangxuefeng-transcribe-${{ github.ref }}
  cancel-in-progress: false

jobs:
  transcribe-one:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    env:
      BILIBILI_SPACE_URL: https://space.bilibili.com/28152637/video
      BILIBILI_COOKIES_FILE: cookies.txt
      WHISPER_MODEL: small
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_LANGUAGE: zh
      AUDIO_FORMAT: mp3
      AUDIO_QUALITY: "7"
      BEAM_SIZE: "1"
      VAD_FILTER: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp faster-whisper

      - name: Write cookies
        shell: bash
        run: |
          cat > cookies.txt <<'EOF'
          ${{ secrets.BILIBILI_COOKIES }}
          EOF

      - name: Prepare workspace
        run: |
          mkdir -p state transcripts tmp_audio scripts

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Show current repo state
        shell: bash
        run: |
          echo "===== branch ====="
          git branch --show-current || true
          echo "===== done count ====="
          if [ -f state/done.txt ]; then
            wc -l state/done.txt
          else
            echo "0 state/done.txt"
          fi
          echo "===== failed count ====="
          if [ -f state/failed.txt ]; then
            wc -l state/failed.txt
          else
            echo "0 state/failed.txt"
          fi
          echo "===== current progress ====="
          if [ -f state/progress.json ]; then
            cat state/progress.json
          else
            echo "no progress.json"
          fi

      - name: Run one video
        run: |
          python scripts/transcribe_bili.py

      - name: Show final repo state
        if: always()
        shell: bash
        run: |
          echo "===== final progress ====="
          if [ -f state/progress.json ]; then
            cat state/progress.json
          else
            echo "no progress.json"
          fi
          echo "===== done count ====="
          if [ -f state/done.txt ]; then
            wc -l state/done.txt
          else
            echo "0 state/done.txt"
          fi
          echo "===== failed count ====="
          if [ -f state/failed.txt ]; then
            wc -l state/failed.txt
          else
            echo "0 state/failed.txt"
          fi
          echo "===== transcript files ====="
          find transcripts -maxdepth 1 -type f | wc -l || true

      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -f state/continue.flag ]; then
            echo "continue.flag exists, trigger next run"
            sleep 15
            gh workflow run .github/workflows/transcribe.yml --ref "${GITHUB_REF_NAME}"
          else
            echo "continue.flag not found, stop here"
          fi
