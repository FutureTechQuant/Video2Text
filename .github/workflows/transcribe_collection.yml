name: transcribe-collection

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "合集链接，优先填写 space.bilibili.com/.../lists/...?...type=season"
        required: true
        type: string
      destination:
        description: "输出目录/文件名前缀，例如 guonihe_qingnian 或 过拟合青年"
        required: true
        type: string
      whisper_model:
        description: "Whisper 模型，如 tiny / base / small / medium"
        required: false
        default: "small"
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: collection-${{ inputs.destination }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  transcribe-one:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    env:
      BILIBILI_SOURCE_URL: ${{ inputs.source_url }}
      DESTINATION: ${{ inputs.destination }}
      BILIBILI_COOKIES_FILE: cookies.txt
      WHISPER_MODEL: ${{ inputs.whisper_model }}
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_LANGUAGE: zh
      AUDIO_FORMAT: mp3
      AUDIO_QUALITY: "7"
      BEAM_SIZE: "1"
      VAD_FILTER: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U yt-dlp faster-whisper

      - name: Write cookies
        shell: bash
        run: |
          cat > cookies.txt <<'EOF'
          ${{ secrets.BILIBILI_COOKIES }}
          EOF

      - name: Validate inputs
        shell: bash
        run: |
          test -n "${BILIBILI_SOURCE_URL}" || (echo "source_url is empty" && exit 1)
          test -n "${DESTINATION}" || (echo "destination is empty" && exit 1)

      - name: Prepare workspace
        run: |
          mkdir -p state_collections destinations tmp_audio scripts

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute safe destination
        id: vars
        shell: bash
        run: |
          SAFE_DEST=$(python - <<'PY'
          import os, re
          s = (os.environ.get("DESTINATION", "") or "").strip()
          s = re.sub(r'[<>:"/\\|?*\x00-\x1f]+', "_", s)
          s = re.sub(r"\s+", "_", s)
          s = s.strip("._ ")
          print((s[:80] or "default"))
          PY
          )
          echo "safe_dest=$SAFE_DEST" >> "$GITHUB_OUTPUT"
          echo "SAFE_DEST=$SAFE_DEST" >> "$GITHUB_ENV"

      - name: Show current repo state
        shell: bash
        run: |
          echo "===== branch ====="
          git branch --show-current || true
          echo
          echo "===== source_url ====="
          echo "${BILIBILI_SOURCE_URL}"
          echo
          echo "===== destination(raw) ====="
          echo "${DESTINATION}"
          echo
          echo "===== destination(safe) ====="
          echo "${SAFE_DEST}"
          echo
          echo "===== done count ====="
          if [ -f "state_collections/${SAFE_DEST}/done.txt" ]; then
            wc -l "state_collections/${SAFE_DEST}/done.txt"
          else
            echo "0 state_collections/${SAFE_DEST}/done.txt"
          fi
          echo
          echo "===== failed count ====="
          if [ -f "state_collections/${SAFE_DEST}/failed.txt" ]; then
            wc -l "state_collections/${SAFE_DEST}/failed.txt"
          else
            echo "0 state_collections/${SAFE_DEST}/failed.txt"
          fi
          echo
          echo "===== current progress ====="
          if [ -f "state_collections/${SAFE_DEST}/progress.json" ]; then
            cat "state_collections/${SAFE_DEST}/progress.json"
          else
            echo "no progress.json"
          fi
          echo
          echo "===== current queue size ====="
          if [ -f "state_collections/${SAFE_DEST}/queue.json" ]; then
            jq 'length' "state_collections/${SAFE_DEST}/queue.json"
          else
            echo "no queue.json"
          fi

      - name: Run one video
        run: |
          python scripts/transcribe_bili_collection.py

      - name: Show final repo state
        if: always()
        shell: bash
        run: |
          echo "===== final progress ====="
          if [ -f "state_collections/${SAFE_DEST}/progress.json" ]; then
            cat "state_collections/${SAFE_DEST}/progress.json"
          else
            echo "no progress.json"
          fi
          echo
          echo "===== done count ====="
          if [ -f "state_collections/${SAFE_DEST}/done.txt" ]; then
            wc -l "state_collections/${SAFE_DEST}/done.txt"
          else
            echo "0 state_collections/${SAFE_DEST}/done.txt"
          fi
          echo
          echo "===== failed count ====="
          if [ -f "state_collections/${SAFE_DEST}/failed.txt" ]; then
            wc -l "state_collections/${SAFE_DEST}/failed.txt"
          else
            echo "0 state_collections/${SAFE_DEST}/failed.txt"
          fi
          echo
          echo "===== queue size ====="
          if [ -f "state_collections/${SAFE_DEST}/queue.json" ]; then
            jq 'length' "state_collections/${SAFE_DEST}/queue.json"
          else
            echo "no queue.json"
          fi
          echo
          echo "===== output files ====="
          find "destinations/${SAFE_DEST}" -type f | sort || true

      - name: Trigger next run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          FLAG="state_collections/${SAFE_DEST}/continue.flag"

          if [ -f "$FLAG" ]; then
            echo "continue.flag exists, trigger next run"
            sleep 15
            gh workflow run ".github/workflows/transcribe_collection.yml" \
              --ref "${GITHUB_REF_NAME}" \
              -f source_url="${BILIBILI_SOURCE_URL}" \
              -f destination="${DESTINATION}" \
              -f whisper_model="${WHISPER_MODEL}"
          else
            echo "continue.flag not found, stop here"
          fi
