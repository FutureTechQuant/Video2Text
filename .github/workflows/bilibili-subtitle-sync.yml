name: Sync Bilibili Subtitles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Write cookies.txt
        env:
          BILIBILI_COOKIES_TXT: ${{ secrets.BILIBILI_COOKIES_TXT }}
        run: |
          cat > cookies.txt <<'EOF'
          $BILIBILI_COOKIES_TXT
          EOF

      - name: Validate cookies.txt
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path("cookies.txt")
          text = p.read_text(encoding="utf-8", errors="ignore")
          first = text.splitlines()[0] if text.splitlines() else ""
          print("file exists:", p.exists())
          print("file size:", p.stat().st_size if p.exists() else 0)
          print("first line:", first)
          print("has SESSDATA:", "SESSDATA" in text)
          PY

      - name: Fetch subtitles
        env:
          BVID: BV1TC1jYmEve
          BILIBILI_COOKIE_FILE: cookies.txt
        run: python scripts/fetch_bilibili_subtitles.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add subtitles/
          git diff --cached --quiet || git commit -m "sync bilibili subtitles"
          git push
