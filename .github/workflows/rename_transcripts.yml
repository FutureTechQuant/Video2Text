name: rename-transcripts-from-bilibili

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rename-transcripts-from-bilibili-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rename:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp

      - name: Write cookies
        shell: bash
        run: |
          cat > cookies.txt <<'EOF'
          ${{ secrets.BILIBILI_COOKIES }}
          EOF

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rename transcripts using live bilibili title
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          import subprocess
          from pathlib import Path

          transcripts_dir = Path("transcripts")
          cookies_file = Path("cookies.txt")

          def sanitize_filename(name: str, max_len: int = 180) -> str:
              name = re.sub(r'[<>:"/\\|?*\x00-\x1f]+', "_", name).strip()
              name = re.sub(r"\s+", " ", name)
              return name[:max_len].rstrip(" .") or "untitled"

          def unique_path(path: Path) -> Path:
              if not path.exists():
                  return path
              stem = path.stem
              suffix = path.suffix
              parent = path.parent
              i = 2
              while True:
                  candidate = parent / f"{stem} ({i}){suffix}"
                  if not candidate.exists():
                      return candidate
                  i += 1

          def fetch_title(bvid: str) -> str:
              url = f"https://www.bilibili.com/video/{bvid}"
              cmd = [
                  "yt-dlp",
                  "--cookies", str(cookies_file),
                  "--print", "%(title)s",
                  "--no-warnings",
                  "--no-playlist",
                  url,
              ]
              r = subprocess.run(cmd, text=True, capture_output=True)
              title = (r.stdout or "").strip().splitlines()
              if r.returncode == 0 and title:
                  return title[-1].strip()

              cmd_json = [
                  "yt-dlp",
                  "--cookies", str(cookies_file),
                  "-J",
                  "--no-warnings",
                  "--no-playlist",
                  url,
              ]
              r2 = subprocess.run(cmd_json, text=True, capture_output=True)
              if r2.returncode == 0 and (r2.stdout or "").strip():
                  data = json.loads(r2.stdout)
                  t = (data.get("title") or "").strip()
                  if t:
                      return t

              raise RuntimeError(
                  f"failed to fetch title for {bvid}: {r.stderr[-500:] or r2.stderr[-500:]}"
              )

          renamed = 0
          skipped = 0
          failed = 0

          for src in sorted(transcripts_dir.glob("BV*.txt")):
              bvid = src.stem
              try:
                  title = sanitize_filename(fetch_title(bvid))
                  dst = unique_path(transcripts_dir / f"{title}.txt")

                  if src.resolve() == dst.resolve():
                      print(f"skip(same): {src.name}")
                      skipped += 1
                      continue

                  src.rename(dst)
                  print(f"renamed: {src.name} -> {dst.name}")
                  renamed += 1

              except Exception as e:
                  print(f"failed: {src.name} -> {e}")
                  failed += 1

          print(f"renamed total: {renamed}")
          print(f"skipped total: {skipped}")
          print(f"failed total: {failed}")
          PY

      - name: Commit and push
        shell: bash
        run: |
          git add transcripts
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "repair: rename transcripts from bilibili title"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
